# docs/coverage.toml
#
# The Coverage Matrix is the single source of truth for "is item X
# implemented in the engine?" It maps every spec'd item to the
# crate that owns the implementation, the build-plan phase that
# delivers it, and the current status.
#
# Schema (one row per spec'd item):
#   id      : string  — stable identifier (snake_case)
#   item    : string  — human-readable name
#   spec    : string  — relative path to the spec doc
#   crate   : string  — educore-<name> package that owns the impl
#   phase   : int     — 0..17 build-plan phase
#   status  : enum    — Pending | Implemented | Tested | Deprecated
#   tests   : string? — relative path to the integration test (when status >= Tested)
#   notes   : string? — free-form note
#
# This file is machine-readable so CI can diff it on every PR. A
# PR that adds or removes an item in docs/specs/ or crates/<d>/
# without a corresponding change to this file fails the
# per-PR gate (see docs/build-plan.md § The No-Gaps Gates).
#
# Status progression: Pending → Implemented → Tested. The Tested
# status is terminal; Deprecated is the alternative terminal state.
#
# Initial scaffold: ~80 representative rows covering the engine
# cross-cutting tables, the 7 port traits, and 1-3 aggregates per
# domain. The full 226+ row matrix is generated by the lint
# sub-module (educore-core::lint) from the spec catalogs and the
# code inventory once implementation begins.

