# Production Readiness Roadmap — data file
#
# Source of truth for the auto-generated roadmap. The script
# `scripts/update-roadmap.py` reads this file, runs each `check`,
# and regenerates the COMPUTED sections of
# `12-production-readiness-roadmap.md`.
#
# Check types:
#   cmd:<shell command>      exit 0 = done
#   file:<path> regex:<pat>  grep matches = done
#   file-exists:<path>       file exists = done
#   commit:<regex>           git log has matching commit = done
#   manual                   no auto-check (human review)
#
# To add a new item: append a [[item]] block.
# To add a new gate: append a [[gate]] block.

[meta]
title = "Production Readiness Roadmap"
last_update = "2026-06-25"
main_head = "2eb7d88"
wave = "Wave 5 vertical slices complete"

# ============================================================================
# Production gates (6 boxes — all must pass to declare production-ready)
# ============================================================================

[[gate]]
id = "lint"
name = "Gate-1 Lint"
description = "`cargo run -p educore-core --bin lint --features lint` exits 0"
check = "cmd:cargo run -p educore-core --bin lint --features lint"

[[gate]]
id = "tests"
name = "Gate-2 Tests"
description = "`cargo test --workspace` passes (zero failures)"
check = "manual:cargo test --workspace"

[[gate]]
id = "clippy"
name = "Gate-3 Clippy"
description = "`cargo clippy --workspace --all-targets -- -D warnings` exits 0"
check = "cmd:cargo clippy --workspace --all-targets -- -D warnings"

[[gate]]
id = "fmt"
name = "Gate-4 Fmt"
description = "`cargo fmt --all -- --check` exits 0"
check = "cmd:cargo fmt --all -- --check"

[[gate]]
id = "adapters"
name = "Gate-5 Adapters"
description = "All 4 storage adapters' `create_schema()` round-trip on a fresh DB"
check = "manual:cargo test -p educore-storage-parity --features all-dbs"

[[gate]]
id = "decisions"
name = "Gate-6 Decisions"
description = "All items in `13-decision-needed.md` resolved"
check = "manual:see 13-decision-needed.md"

