[package]
name = "educore-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Educore core types: errors, identifiers, value objects, the query AST, and shared infrastructure."

[lints]
workspace = true

[features]
# The `lint` feature pulls in the [`lint`](self::lint) sub-module
# and its CLI binary (`src/bin/lint.rs`). It is opt-in: the release
# build of `educore-core` does not include the runner.
lint = []

[dependencies]
serde = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
indexmap = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
derive_more = { workspace = true }
validator = { workspace = true }
secrecy = { workspace = true }

[dev-dependencies]
proptest = "1.5"
