[package]
name = "educore-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Sample CLI demonstrating daily engine operations (admit, attendance, payment). NOT shipped to library consumers."

[lints]
workspace = true

[[bin]]
name = "educore-cli"
path = "src/main.rs"

[dependencies]
educore-testkit = { workspace = true }
educore-storage = { workspace = true }
educore-payment = { workspace = true }
educore-core = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
chrono = { workspace = true }
uuid = { workspace = true }
