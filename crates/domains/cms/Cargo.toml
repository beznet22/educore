[package]
name = "educore-cms"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Website pages, news, content uploads, testimonials, sliders, course pages."

[lints]
workspace = true

[dependencies]
educore-core = { workspace = true }
educore-platform = { workspace = true }
educore-rbac = { workspace = true }
educore-events = { workspace = true }
educore-settings = { workspace = true }
educore-audit = { workspace = true }
# Phase 12: `Content` + `ContentShareList` + `TeacherUploadContent` aggregates
# reference `ClassId`, `SectionId`, and `AcademicYearId` from the academic
# domain. Per `docs/specs/cms/overview.md` § Dependencies.
educore-academic = { workspace = true }
# Wave 8.3: the service factories take `&dyn Transaction` (per
# SCHEMA-AUDIT-ATOMIC, Wave 6.6) so the runtime code needs the
# `Transaction` trait. `educore-storage` lives in the `infra`
# tier (per `docs/decisions/ADR-013-CrateLayout.md`), so a
# domain-tier crate may depend on it.
educore-storage = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
educore-event-bus = { workspace = true }
tokio = { workspace = true }
# Wave 8.3: integration tests use the testkit's
# `InMemoryStorageAdapter::begin()` to obtain a
# `Box<dyn Transaction>` for the service factories.
educore-testkit = { workspace = true }

